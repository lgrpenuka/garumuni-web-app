<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garumuni Logistics | Collector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0a0a0a; --card: #1a1a1a; --green: #4CAF50; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; }
        .card { background: var(--card); padding: 24px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4444; margin-right: 5px; }
        .online .status-dot { background: var(--green); }
        
        label { display: block; font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; background: #262626; border: 1px solid #383838; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        .photo-upload { margin-top: 15px; border: 2px dashed #444; border-radius: 12px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
        #preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .btn-primary { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 700; font-size: 1rem; margin-top: 25px; cursor: pointer; transition: transform 0.1s; }
        .btn-secondary { background: #333; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: 600; margin-top: 10px; cursor: pointer; }
        .btn-primary:active { transform: scale(0.98); }
        
        #sync-banner { background: var(--green); color: black; font-size: 0.8rem; font-weight: bold; padding: 10px; border-radius: 8px; margin-top: 15px; text-align: center; display: none; }

        #qr-output { margin-top: 30px; text-align: center; display: none; background: #fff; padding: 20px; border-radius: 15px; color: #000; }
        #batch-id-display { font-weight: 800; margin-top: 10px; font-family: monospace; font-size: 1.2rem; }
    </style>
</head>
<body class="online">

<div class="container">
    <div class="card">
        <div class="header">
            <h2 style="margin:0; font-size: 1.1rem; color: var(--gold);">Stock Collection Portal</h2>
            <div id="connection-status" style="display: flex; align-items: center; font-size: 0.7rem;">
                <div class="status-dot"></div> <span id="status-text">ONLINE</span>
            </div>
        </div>

        <div id="sync-banner">🔄 AUTO-SYNCING PENDING BATCHES...</div>

        <form id="stockForm">
            <label>GS Division / Route</label>
            <input type="text" id="region" placeholder="e.g., Balapitiya West" required>

            <label>Farmer / Supplier</label>
            <input type="text" id="farmer" placeholder="Enter name" required>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Grade</label>
                    <select id="grade">
                        <option value="Alba">Alba</option>
                        <option value="C5-Special">C5 Special</option>
                        <option value="C4">C4</option>
                        <option value="Quillings">Quillings</option>
                    </select>
                </div>
                <div>
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" step="0.1" placeholder="0.0" required>
                </div>
            </div>

            <label>Quality Evidence (Photo)</label>
            <div class="photo-upload" onclick="document.getElementById('fileInput').click()">
                <span id="upload-placeholder">📸 Capture Stock</span>
                <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="previewImage(this)">
                <img id="preview">
            </div>

            <button type="button" class="btn-primary" onclick="handleSubmission()">SAVE & GENERATE QR</button>
        </form>

        <div id="qr-output">
            <div id="qrcode" style="display: flex; justify-content: center;"></div>
            <div id="batch-id-display"></div>
            
            <button class="btn-secondary" style="background: var(--green); color: white;" onclick="downloadQR()">⬇️ DOWNLOAD QR IMAGE</button>
            
            <button class="btn-secondary" onclick="document.getElementById('qr-output').style.display='none'">CLOSE</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxvj0uMuoUzLhdmkMGQPKQQtjbzwaliZCZqzqwKboFoBzLZMMq7gBUqleV5q8PoS_GB/exec";
    let base64Image = "";
    let currentBatchID = "";

    window.addEventListener('online', () => { updateConnectivity(); autoSync(); });
    window.addEventListener('offline', updateConnectivity);
    
    function updateConnectivity() {
        const isOnline = navigator.onLine;
        document.body.className = isOnline ? 'online' : 'offline';
        document.getElementById('status-text').innerText = isOnline ? 'ONLINE' : 'OFFLINE';
    }

    function previewImage(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            base64Image = e.target.result;
            document.getElementById('preview').src = base64Image;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('upload-placeholder').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    async function handleSubmission() {
        currentBatchID = "GRMN-" + Date.now().toString().slice(-8);
        const data = {
            batchID: currentBatchID,
            region: document.getElementById('region').value,
            farmer: document.getElementById('farmer').value,
            grade: document.getElementById('grade').value,
            weight: document.getElementById('weight').value,
            photo: base64Image,
            timestamp: new Date().toLocaleString(),
            status: "Collected"
        };

        if(!data.farmer || !data.weight || !data.region) { 
            alert("Please fill in all details."); 
            return; 
        }

        let queue = JSON.parse(localStorage.getItem('grmn_queue') || "[]");
        queue.push(data);
        localStorage.setItem('grmn_queue', JSON.stringify(queue));

        // Display QR
        document.getElementById('qr-output').style.display = 'block';
        document.getElementById('batch-id-display').innerText = currentBatchID;
        const qrDiv = document.getElementById('qrcode');
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { 
            text: `https://garumunifoods.com/trace?id=${currentBatchID}`, 
            width: 200, 
            height: 200 
        });

        resetForm();
        if(navigator.onLine) autoSync();
    }

    function downloadQR() {
        // Find the image or canvas generated by QRCode.js
        const qrContainer = document.getElementById('qrcode');
        const img = qrContainer.querySelector('img');
        const canvas = qrContainer.querySelector('canvas');
        
        let downloadLink = document.createElement("a");
        downloadLink.download = `${currentBatchID}-QR.png`;

        if (img && img.src) {
            downloadLink.href = img.src;
        } else if (canvas) {
            downloadLink.href = canvas.toDataURL("image/png");
        }
        
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }

    function resetForm() {
        document.getElementById('stockForm').reset();
        document.getElementById('preview').style.display = 'none';
        document.getElementById('upload-placeholder').style.display = 'block';
        base64Image = "";
    }

    async function autoSync() {
        const queue = JSON.parse(localStorage.getItem('grmn_queue') || "[]");
        if(queue.length === 0) return;

        document.getElementById('sync-banner').style.display = 'block';
        const remainingQueue = [];
        
        for(const item of queue) {
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(item) });
            } catch(e) {
                remainingQueue.push(item);
            }
        }

        localStorage.setItem('grmn_queue', JSON.stringify(remainingQueue));
        setTimeout(() => { document.getElementById('sync-banner').style.display = 'none'; }, 2000);
    }
    
    updateConnectivity();
    if(navigator.onLine) autoSync();
</script>

</body>
</html>
