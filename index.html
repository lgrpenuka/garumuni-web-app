<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garumuni | Cinnamon Logistics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0a0a0a; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 15px; }
        .container { width: 100%; max-width: 450px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        
        .role-switch { display: flex; background: #222; padding: 5px; border-radius: 10px; margin-bottom: 20px; }
        .role-btn { flex: 1; border: none; padding: 10px; background: none; color: #666; font-weight: 800; cursor: pointer; border-radius: 7px; }
        .role-btn.active { background: var(--gold); color: #000; }

        .name-banner { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; align-items: center; justify-content: space-between; border: 1px solid #333; }
        label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; margin-top: 15px; letter-spacing: 1px; }
        input, select { width: 100%; padding: 14px; margin-top: 6px; background: #262626; border: 1px solid #383838; color: #fff; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        .btn-submit { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 700; margin-top: 25px; cursor: pointer; }
        
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.98); display:none; padding: 30px; box-sizing: border-box; z-index: 100; text-align: center; overflow-y: auto; }
        .preview-box { background: #222; padding: 20px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 20px; text-align: left; }
        #qrcode { background: white; padding: 15px; display: inline-block; margin: 20px 0; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="color: var(--gold); margin: 0 0 15px 0;">Batch Entry</h2>
        
        <div id="inspectorBanner" class="name-banner">
            <span id="displayName" style="font-size: 0.8rem; font-weight: bold;"></span>
            <span onclick="resetName()" style="color: var(--gold); font-size: 0.7rem; cursor: pointer;">CHANGE</span>
        </div>

        <div class="role-switch">
            <button id="w1" class="role-btn active" onclick="setRole('Worker 1')">WORKER 1</button>
            <button id="w2" class="role-btn" onclick="setRole('Worker 2')">WORKER 2</button>
        </div>

        <form id="logForm">
            <div id="nameInputGroup">
                <label>Inspector Name</label>
                <input type="text" id="inspector" placeholder="Type your name">
            </div>

            <label>Farmer Name</label>
            <input type="text" id="farmer" placeholder="Source farmer name" required>

            <label>Species / Grade</label>
            <select id="species">
                <option value="Alba">Alba</option>
                <option value="C5 Special">C5 Special</option>
                <option value="C5">C5</option>
                <option value="C4">C4</option>
                <option value="M5">M5</option>
                <option value="M4">M4</option>
                <option value="H1">H1</option>
                <option value="Quillings">Quillings</option>
            </select>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                <div>
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" step="0.01" placeholder="0.00" required>
                </div>
                <div>
                    <label>Length (in)</label>
                    <input type="number" id="length" step="0.1" placeholder="0.0">
                </div>
                <div>
                    <label>Moisture %</label>
                    <input type="number" id="moisture" step="0.1" placeholder="0%">
                </div>
            </div>

            <button type="button" class="btn-submit" id="mainBtn" onclick="submitLog()">SAVE & GENERATE QR</button>
        </form>
    </div>
</div>

<div id="overlay">
    <h2 style="color: var(--gold); margin-bottom: 0;">BATCH RECORDED</h2>
    <div id="qrcode"></div>
    
    <div class="preview-box">
        <p style="color: var(--gold); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; font-size: 0.7rem;">Verification Data</p>
        <div id="summaryText" style="font-size: 0.95rem; line-height: 1.8;"></div>
    </div>
    
    <button class="btn-submit" onclick="location.reload()">NEXT BATCH</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxvj0uMuoUzLhdmkMGQPKQQtjbzwaliZCZqzqwKboFoBzLZMMq7gBUqleV5q8PoS_GB/exec";
    let role = "Worker 1";

    window.onload = () => {
        const savedName = localStorage.getItem('grmn_name');
        if (savedName) {
            document.getElementById('inspector').value = savedName;
            showBanner(savedName);
        }
    };

    function showBanner(name) {
        document.getElementById('nameInputGroup').style.display = 'none';
        document.getElementById('inspectorBanner').style.display = 'flex';
        document.getElementById('displayName').innerText = "Logged as: " + name;
    }

    function resetName() {
        localStorage.removeItem('grmn_name');
        document.getElementById('nameInputGroup').style.display = 'block';
        document.getElementById('inspectorBanner').style.display = 'none';
    }

    function setRole(r) {
        role = r;
        document.getElementById('w1').className = r === 'Worker 1' ? 'role-btn active' : 'role-btn';
        document.getElementById('w2').className = r === 'Worker 2' ? 'role-btn active' : 'role-btn';
    }

    async function submitLog() {
        const name = document.getElementById('inspector').value;
        const farmer = document.getElementById('farmer').value;
        const w = document.getElementById('weight').value;
        const s = document.getElementById('species').value;
        const l = document.getElementById('length').value || "0";
        const m = document.getElementById('moisture').value || "0";
        
        if(!name || !farmer || !w) return alert("Please enter Inspector, Farmer, and Weight.");

        localStorage.setItem('grmn_name', name);
        const btn = document.getElementById('mainBtn');
        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        const payload = {
            workerRole: role,
            inspector: name,
            farmer: farmer,
            weight: w,
            length: l,
            moisture: m,
            species: s,
            timestamp: new Date().toLocaleTimeString()
        };

        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: result.details,
                width: 180,
                height: 180
            });

            document.getElementById('summaryText').innerHTML = `
                <b>Batch ID:</b> ${result.id}<br>
                <b>Farmer:</b> ${farmer}<br>
                <b>Species:</b> ${s}<br>
                <b>Weight:</b> ${w} kg<br>
                <b>Length:</b> ${l} in<br>
                <b>Moisture:</b> ${m} %<br>
                <hr style="border:0; border-top:1px solid #444; margin: 10px 0;">
                <span style="color:#888; font-size:0.8rem">Verified by ${name} (${role}) at ${payload.timestamp}</span>
            `;

            document.getElementById('overlay').style.display = 'block';
        } catch(e) {
            alert("Error saving data.");
            btn.innerText = "SAVE & GENERATE QR";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
